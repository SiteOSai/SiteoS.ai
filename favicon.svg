<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Building outline -->
  <polyline points="15,80 15,35 45,10 75,35 75,80" 
    fill="none" stroke="#1a6b3c" stroke-width="7" stroke-linejoin="round"/>
  <!-- Door/person base -->
  <line x1="42" y1="80" x2="42" y2="58" 
    stroke="#1a6b3c" stroke-width="6" stroke-linecap="round"/>
  <!-- Person dot -->
  <circle cx="55" cy="52" r="6" fill="#1a6b3c"/>
  <!-- Ground line -->
  <line x1="10" y1="80" x2="90" y2="80" 
    stroke="#1a6b3c" stroke-width="7" stroke-linecap="round"/>
</svg>